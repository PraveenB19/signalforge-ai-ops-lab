name: Terraform Dev Plan

on:
  workflow_dispatch:
  push:
    branches:
      - feature/java-app
    paths:
      - "infra/**"
      - ".github/workflows/terraform-dev-plan.yml"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform plan dev
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: signalforge-terraform-dev-plan
          allowed-account-ids: "575108962419"

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false

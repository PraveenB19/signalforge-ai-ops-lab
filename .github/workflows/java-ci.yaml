name: Java CI

on:
  push:
    branches: 
        - main
        - dev
        - feature/**
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalforge-app
          path: app/target/*.jar
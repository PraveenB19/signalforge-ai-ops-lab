name: Deploy Dev Application

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    environment: dev

    if: github.ref == 'refs/heads/dev'

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ARTIFACT_BUCKET: signalforge-dev-artifacts-575108962419-us-east-1
      APP_KEY: releases/signalforge-app-${{ github.sha }}.jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build tested JAR
        working-directory: app
        run: mvn -B verify

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: signalforge-dev-deploy
          allowed-account-ids: "575108962419"

      - name: Upload tested JAR to S3
        run: aws s3 cp app/target/signalforge-app-0.1.0-SNAPSHOT.jar "s3://${ARTIFACT_BUCKET}/${APP_KEY}"

      - name: Deploy JAR through SSM
        run: |
          COMMAND_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy SignalForge app ${GITHUB_SHA}" \
            --targets "Key=tag:Name,Values=signalforge-dev-app" \
            --parameters commands="[
              \"set -euo pipefail\",
              \"sudo dnf install -y java-21-amazon-corretto-headless awscli amazon-cloudwatch-agent\",
              \"sudo mkdir -p /opt/signalforge /var/log/signalforge\",
              \"sudo aws s3 cp s3://${ARTIFACT_BUCKET}/${APP_KEY} /opt/signalforge/signalforge-app.jar\",
              \"sudo touch /var/log/signalforge/app.log /var/log/signalforge/gc.log\",
              \"sudo tee /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json >/dev/null <<'CWAGENT'\",
              \"{\",
              \"  \\\"agent\\\": {\\\"metrics_collection_interval\\\": 60, \\\"run_as_user\\\": \\\"root\\\"},\",
              \"  \\\"metrics\\\": {\",
              \"    \\\"namespace\\\": \\\"CWAgent\\\",\",
              \"    \\\"append_dimensions\\\": {\",
              \"      \\\"InstanceId\\\": \\\"\${aws:InstanceId}\\\",\",
              \"      \\\"AutoScalingGroupName\\\": \\\"\${aws:AutoScalingGroupName}\\\"\",
              \"    },\",
              \"    \\\"aggregation_dimensions\\\": [[\\\"AutoScalingGroupName\\\"], [\\\"AutoScalingGroupName\\\", \\\"path\\\"]],\",
              \"    \\\"metrics_collected\\\": {\",
              \"      \\\"mem\\\": {\\\"measurement\\\": [\\\"mem_used_percent\\\"]},\",
              \"      \\\"disk\\\": {\\\"measurement\\\": [\\\"used_percent\\\"], \\\"resources\\\": [\\\"/\\\"], \\\"ignore_file_system_types\\\": [\\\"sysfs\\\", \\\"devtmpfs\\\", \\\"tmpfs\\\"]},\",
              \"      \\\"swap\\\": {\\\"measurement\\\": [\\\"swap_used_percent\\\"]}\",
              \"    }\",
              \"  },\",
              \"  \\\"logs\\\": {\",
              \"    \\\"logs_collected\\\": {\",
              \"      \\\"files\\\": {\",
              \"        \\\"collect_list\\\": [\",
              \"          {\\\"file_path\\\": \\\"/var/log/signalforge/app.log\\\", \\\"log_group_name\\\": \\\"/aws/ec2/signalforge-dev/signalforge\\\", \\\"log_stream_name\\\": \\\"{instance_id}/app\\\", \\\"timezone\\\": \\\"UTC\\\"},\",
              \"          {\\\"file_path\\\": \\\"/var/log/signalforge/gc.log*\\\", \\\"log_group_name\\\": \\\"/aws/ec2/signalforge-dev/signalforge\\\", \\\"log_stream_name\\\": \\\"{instance_id}/gc\\\", \\\"timezone\\\": \\\"UTC\\\"}\",
              \"        ]\",
              \"      }\",
              \"    }\",
              \"  }\",
              \"}\",
              \"CWAGENT\",
              \"sudo tee /etc/systemd/system/signalforge.service >/dev/null <<'SERVICE'\",
              \"[Unit]\",
              \"Description=SignalForge Java application\",
              \"After=network-online.target\",
              \"Wants=network-online.target\",
              \"\",
              \"[Service]\",
              \"WorkingDirectory=/opt/signalforge\",
              \"ExecStart=/usr/bin/java -Xlog:gc*:file=/var/log/signalforge/gc.log:time,uptime,level,tags:filecount=5,filesize=10M -jar /opt/signalforge/signalforge-app.jar\",
              \"StandardOutput=append:/var/log/signalforge/app.log\",
              \"StandardError=append:/var/log/signalforge/app.log\",
              \"Restart=always\",
              \"RestartSec=10\",
              \"User=root\",
              \"\",
              \"[Install]\",
              \"WantedBy=multi-user.target\",
              \"SERVICE\",
              \"sudo systemctl daemon-reload\",
              \"sudo systemctl disable --now signalforge-placeholder.service || true\",
              \"sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s\",
              \"sudo systemctl enable signalforge.service\",
              \"sudo systemctl restart signalforge.service\",
              \"for i in {1..30}; do curl -fsS http://localhost:8080/actuator/health && exit 0; echo waiting for app health attempt $i/30; sleep 2; done\",
              \"systemctl status signalforge.service --no-pager || true\",
              \"journalctl -u signalforge.service -n 80 --no-pager || true\",
              \"exit 1\"
            ]" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM command id: ${COMMAND_ID}"
          aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details

          for attempt in {1..60}; do
            statuses="$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --query 'CommandInvocations[].Status' --output text)"
            echo "SSM invocation statuses: ${statuses}"

            if ! echo "${statuses}" | grep -Eq 'Pending|InProgress|Delayed'; then
              break
            fi

            sleep 5
          done

          aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details

          failed_count="$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --query "length(CommandInvocations[?Status!='Success'])" --output text)"
          test "${failed_count}" = "0"

name: Deploy Dev Application

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    environment: dev

    if: github.ref == 'refs/heads/dev'

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ARTIFACT_BUCKET: signalforge-dev-artifacts-575108962419-us-east-1
      APP_KEY: releases/signalforge-app-${{ github.sha }}.jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build tested JAR
        working-directory: app
        run: mvn -B verify

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: signalforge-dev-deploy
          allowed-account-ids: "575108962419"

      - name: Upload tested JAR to S3
        run: aws s3 cp app/target/signalforge-app-0.1.0-SNAPSHOT.jar "s3://${ARTIFACT_BUCKET}/${APP_KEY}"

      - name: Deploy JAR through SSM
        run: |
          COMMAND_ID="$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy SignalForge app ${GITHUB_SHA}" \
            --targets "Key=tag:Name,Values=signalforge-dev-app" \
            --parameters commands="[
              \"set -euo pipefail\",
              \"sudo dnf install -y java-21-amazon-corretto-headless awscli\",
              \"sudo mkdir -p /opt/signalforge\",
              \"sudo aws s3 cp s3://${ARTIFACT_BUCKET}/${APP_KEY} /opt/signalforge/signalforge-app.jar\",
              \"sudo tee /etc/systemd/system/signalforge.service >/dev/null <<'SERVICE'\",
              \"[Unit]\",
              \"Description=SignalForge Java application\",
              \"After=network-online.target\",
              \"Wants=network-online.target\",
              \"\",
              \"[Service]\",
              \"WorkingDirectory=/opt/signalforge\",
              \"ExecStart=/usr/bin/java -jar /opt/signalforge/signalforge-app.jar\",
              \"Restart=always\",
              \"RestartSec=10\",
              \"User=root\",
              \"\",
              \"[Install]\",
              \"WantedBy=multi-user.target\",
              \"SERVICE\",
              \"sudo systemctl daemon-reload\",
              \"sudo systemctl disable --now signalforge-placeholder.service || true\",
              \"sudo systemctl enable --now signalforge.service\",
              \"curl -fsS http://localhost:8080/actuator/health\"
            ]" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM command id: ${COMMAND_ID}"
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --query 'CommandInvocations[0].InstanceId' --output text)"
          aws ssm list-command-invocations --command-id "${COMMAND_ID}" --details

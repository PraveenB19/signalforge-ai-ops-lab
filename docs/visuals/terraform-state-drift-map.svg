<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .bg { fill: #090e15; }
      .title { fill: #e7edf6; font: 700 26px Inter, Arial, sans-serif; }
      .sub { fill: #9aa8ba; font: 14px Inter, Arial, sans-serif; }
      .label { fill: #dce6f3; font: 700 16px Inter, Arial, sans-serif; }
      .small { fill: #9aa8ba; font: 13px Inter, Arial, sans-serif; }
      .tiny { fill: #7f8da0; font: 12px Inter, Arial, sans-serif; }
      .box { fill: #141b24; stroke: #334155; stroke-width: 1.2; rx: 12; }
      .blue { stroke: #3b82f6; }
      .green { stroke: #22c55e; }
      .orange { stroke: #f97316; }
      .yellow { stroke: #eab308; }
      .red { stroke: #ef4444; }
      .chip { fill: #111827; stroke: #334155; rx: 10; }
      .line { stroke: #38bdf8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .warn { stroke: #f97316; stroke-width: 2.2; fill: none; marker-end: url(#arrowOrange); }
      .dash { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrowDim); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="780"/>
  <text x="700" y="46" text-anchor="middle" class="title">Terraform State, Locking, And Drift</text>
  <text x="700" y="74" text-anchor="middle" class="sub">Terraform code is desired state. S3 state is memory. Lockfile prevents concurrent edits. Drift is AWS no longer matching code/state.</text>

  <rect x="70" y="130" width="230" height="110" class="box blue"/>
  <text x="100" y="166" class="label">Terraform code</text>
  <text x="100" y="194" class="small">main.tf, variables.tf</text>
  <text x="100" y="218" class="tiny">desired infrastructure</text>

  <rect x="360" y="130" width="230" height="110" class="box green"/>
  <text x="390" y="166" class="label">S3 state</text>
  <text x="390" y="194" class="small">terraform.tfstate</text>
  <text x="390" y="218" class="tiny">Terraform memory</text>

  <rect x="650" y="130" width="230" height="110" class="box yellow"/>
  <text x="680" y="166" class="label">S3 lockfile</text>
  <text x="680" y="194" class="small">use_lockfile = true</text>
  <text x="680" y="218" class="tiny">one apply at a time</text>

  <rect x="940" y="130" width="230" height="110" class="box orange"/>
  <text x="970" y="166" class="label">AWS resources</text>
  <text x="970" y="194" class="small">VPC, ALB, EC2, RDS</text>
  <text x="970" y="218" class="tiny">real infrastructure</text>

  <path class="line" d="M300 185 H360"/>
  <path class="line" d="M590 185 H650"/>
  <path class="line" d="M880 185 H940"/>

  <rect x="140" y="340" width="250" height="230" class="box blue"/>
  <text x="170" y="375" class="label">terraform plan</text>
  <text x="170" y="410" class="small">compares code + state + AWS</text>
  <text x="170" y="444" class="small">shows proposed changes</text>
  <text x="170" y="478" class="small">safe review step</text>

  <rect x="455" y="340" width="250" height="230" class="box green"/>
  <text x="485" y="375" class="label">terraform apply</text>
  <text x="485" y="410" class="small">takes lock</text>
  <text x="485" y="444" class="small">changes AWS</text>
  <text x="485" y="478" class="small">updates state</text>

  <rect x="770" y="340" width="250" height="230" class="box red"/>
  <text x="800" y="375" class="label">drift happens</text>
  <text x="800" y="410" class="small">manual console change</text>
  <text x="800" y="444" class="small">emergency SG fix</text>
  <text x="800" y="478" class="small">resource deleted outside TF</text>

  <rect x="1085" y="340" width="250" height="230" class="box orange"/>
  <text x="1115" y="375" class="label">drift response</text>
  <text x="1115" y="410" class="small">plan -refresh-only</text>
  <text x="1115" y="444" class="small">review before apply</text>
  <text x="1115" y="478" class="small">revert AWS or update code</text>

  <path class="line" d="M390 455 H455"/>
  <path class="warn" d="M705 455 H770"/>
  <path class="line" d="M1020 455 H1085"/>
  <path class="dash" d="M895 340 C895 290 1055 290 1055 240"/>

  <rect x="200" y="645" width="1000" height="74" class="box yellow"/>
  <text x="230" y="676" class="label">Interview memory</text>
  <text x="230" y="702" class="small">Plan before apply. Lock before changing. Detect drift before trusting production. Do not blindly auto-apply prod drift.</text>
</svg>

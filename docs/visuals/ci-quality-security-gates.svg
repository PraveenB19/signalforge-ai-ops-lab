<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .bg { fill: #090e15; }
      .title { fill: #e7edf6; font: 700 26px Inter, Arial, sans-serif; }
      .sub { fill: #9aa8ba; font: 14px Inter, Arial, sans-serif; }
      .label { fill: #dce6f3; font: 700 16px Inter, Arial, sans-serif; }
      .small { fill: #9aa8ba; font: 13px Inter, Arial, sans-serif; }
      .tiny { fill: #7f8da0; font: 12px Inter, Arial, sans-serif; }
      .box { fill: #141b24; stroke: #334155; stroke-width: 1.2; rx: 12; }
      .blue { stroke: #3b82f6; }
      .green { stroke: #22c55e; }
      .orange { stroke: #f97316; }
      .purple { stroke: #a855f7; }
      .yellow { stroke: #eab308; }
      .red { stroke: #ef4444; }
      .chip { fill: #111827; stroke: #334155; rx: 10; }
      .line { stroke: #38bdf8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .gateLine { stroke: #f97316; stroke-width: 2.2; fill: none; marker-end: url(#arrowOrange); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="780"/>
  <text x="700" y="46" text-anchor="middle" class="title">CI Quality And Security Gates</text>
  <text x="700" y="74" text-anchor="middle" class="sub">Build evidence first, then decide whether the artifact can move toward deployment</text>

  <rect x="55" y="130" width="170" height="90" class="box blue"/>
  <text x="85" y="164" class="label">Git Push</text>
  <text x="85" y="190" class="small">feature/dev/main</text>

  <rect x="270" y="130" width="190" height="90" class="box green"/>
  <text x="300" y="164" class="label">Maven Verify</text>
  <text x="300" y="190" class="small">compile, test, package</text>

  <rect x="505" y="95" width="190" height="90" class="box purple"/>
  <text x="535" y="129" class="label">JUnit</text>
  <text x="535" y="155" class="small">unit tests pass/fail</text>

  <rect x="505" y="205" width="190" height="90" class="box purple"/>
  <text x="535" y="239" class="label">JaCoCo</text>
  <text x="535" y="265" class="small">coverage XML</text>

  <rect x="740" y="95" width="220" height="90" class="box orange"/>
  <text x="770" y="129" class="label">SonarQube Cloud</text>
  <text x="770" y="155" class="small">quality + static analysis</text>

  <rect x="740" y="205" width="220" height="90" class="box yellow"/>
  <text x="770" y="239" class="label">Trivy</text>
  <text x="770" y="265" class="small">vulnerabilities + secrets</text>

  <rect x="1010" y="130" width="150" height="90" class="box red"/>
  <text x="1040" y="164" class="label">Gate</text>
  <text x="1040" y="190" class="small">pass or block</text>

  <rect x="1210" y="130" width="145" height="90" class="box green"/>
  <text x="1240" y="164" class="label">Artifact</text>
  <text x="1240" y="190" class="small">deploy same JAR</text>

  <path class="line" d="M225 175 H270"/>
  <path class="line" d="M460 175 C485 175 485 140 505 140"/>
  <path class="line" d="M460 175 C485 175 485 250 505 250"/>
  <path class="line" d="M695 140 H740"/>
  <path class="line" d="M695 250 H740"/>
  <path class="gateLine" d="M960 140 C985 140 985 175 1010 175"/>
  <path class="gateLine" d="M960 250 C985 250 985 175 1010 175"/>
  <path class="line" d="M1160 175 H1210"/>

  <rect x="70" y="355" width="260" height="250" class="box blue"/>
  <text x="98" y="390" class="label">What Maven owns</text>
  <text x="98" y="424" class="small">mvn -B verify</text>
  <text x="98" y="458" class="small">compiles code</text>
  <text x="98" y="484" class="small">runs tests</text>
  <text x="98" y="510" class="small">packages JAR</text>
  <text x="98" y="536" class="small">generates coverage</text>

  <rect x="385" y="355" width="260" height="250" class="box orange"/>
  <text x="413" y="390" class="label">What Sonar owns</text>
  <text x="413" y="424" class="small">bugs and code smells</text>
  <text x="413" y="450" class="small">security hotspots</text>
  <text x="413" y="476" class="small">duplication</text>
  <text x="413" y="502" class="small">coverage from JaCoCo</text>
  <text x="413" y="528" class="small">quality gate decision</text>

  <rect x="700" y="355" width="260" height="250" class="box yellow"/>
  <text x="728" y="390" class="label">What Trivy owns</text>
  <text x="728" y="424" class="small">known vulnerabilities</text>
  <text x="728" y="450" class="small">secrets in repo</text>
  <text x="728" y="476" class="small">filesystem scan</text>
  <text x="728" y="502" class="small">container scan later</text>
  <text x="728" y="528" class="small">IaC scan later</text>

  <rect x="1015" y="355" width="310" height="250" class="box green"/>
  <text x="1043" y="390" class="label">Interview memory</text>
  <text x="1043" y="424" class="small">Build once</text>
  <text x="1043" y="450" class="small">Test once</text>
  <text x="1043" y="476" class="small">Scan once</text>
  <text x="1043" y="502" class="small">Promote same artifact</text>
  <text x="1043" y="538" class="tiny">If gate fails: fix, justify exception, or block.</text>

  <text x="700" y="710" text-anchor="middle" class="sub">Quality gates are release traffic lights. Coverage is evidence, not proof of correctness.</text>
</svg>

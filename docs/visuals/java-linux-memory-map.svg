<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .bg { fill: #090e15; }
      .title { fill: #e7edf6; font: 700 26px Inter, Arial, sans-serif; }
      .sub { fill: #9aa8ba; font: 14px Inter, Arial, sans-serif; }
      .label { fill: #dce6f3; font: 700 16px Inter, Arial, sans-serif; }
      .small { fill: #9aa8ba; font: 13px Inter, Arial, sans-serif; }
      .tiny { fill: #7f8da0; font: 12px Inter, Arial, sans-serif; }
      .box { fill: #141b24; stroke: #334155; stroke-width: 1.2; rx: 12; }
      .host { stroke: #22c55e; }
      .proc { stroke: #3b82f6; }
      .jvm { stroke: #a855f7; }
      .alert { stroke: #f97316; }
      .chip { fill: #111827; stroke: #334155; rx: 10; }
      .line { stroke: #38bdf8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .orangeLine { stroke: #f97316; stroke-width: 2; fill: none; marker-end: url(#arrowOrange); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f97316"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="780"/>
  <text x="700" y="46" text-anchor="middle" class="title">Java Memory Troubleshooting Map</text>
  <text x="700" y="74" text-anchor="middle" class="sub">Do not guess "heap leak" first. Move from host -> process -> JVM -> app behavior.</text>

  <rect x="45" y="115" width="305" height="535" class="box host"/>
  <text x="72" y="150" class="label">Linux Host View</text>
  <text x="72" y="178" class="small">Question: is the EC2 host under pressure?</text>
  <rect x="75" y="215" width="245" height="70" class="chip"/>
  <text x="98" y="242" class="label">Memory + CPU</text>
  <text x="98" y="265" class="small">free -h, top, vmstat 1</text>
  <rect x="75" y="305" width="245" height="70" class="chip"/>
  <text x="98" y="332" class="label">Disk / inode</text>
  <text x="98" y="355" class="small">df -h, df -i, du -sh</text>
  <rect x="75" y="395" width="245" height="70" class="chip"/>
  <text x="98" y="422" class="label">Kernel evidence</text>
  <text x="98" y="445" class="small">dmesg, journalctl</text>
  <text x="72" y="520" class="tiny">What this catches:</text>
  <text x="96" y="548" class="small">OOM kill, disk full, host pressure</text>
  <text x="96" y="574" class="small">another process consuming memory</text>

  <rect x="385" y="115" width="305" height="535" class="box proc"/>
  <text x="412" y="150" class="label">Process View</text>
  <text x="412" y="178" class="small">Question: which process owns the pressure?</text>
  <rect x="415" y="215" width="245" height="70" class="chip"/>
  <text x="438" y="242" class="label">Find the process</text>
  <text x="438" y="265" class="small">ps aux --sort=-%mem</text>
  <rect x="415" y="305" width="245" height="70" class="chip"/>
  <text x="438" y="332" class="label">Track process usage</text>
  <text x="438" y="355" class="small">pidstat -r -p PID 1</text>
  <rect x="415" y="395" width="245" height="70" class="chip"/>
  <text x="438" y="422" class="label">Open files / sockets</text>
  <text x="438" y="445" class="small">lsof -p PID, ss -tp</text>
  <text x="412" y="520" class="tiny">What this catches:</text>
  <text x="436" y="548" class="small">wrong process, file handle leak</text>
  <text x="436" y="574" class="small">deleted log still held open</text>

  <rect x="725" y="115" width="330" height="535" class="box jvm"/>
  <text x="752" y="150" class="label">JVM View</text>
  <text x="752" y="178" class="small">Question: which JVM memory area is growing?</text>
  <rect x="755" y="215" width="270" height="64" class="chip"/>
  <text x="778" y="241" class="label">Heap</text>
  <text x="778" y="263" class="small">objects, leaks, GC pressure</text>
  <rect x="755" y="295" width="270" height="64" class="chip"/>
  <text x="778" y="321" class="label">Thread stacks</text>
  <text x="778" y="343" class="small">too many threads, recursion</text>
  <rect x="755" y="375" width="270" height="64" class="chip"/>
  <text x="778" y="401" class="label">Metaspace</text>
  <text x="778" y="423" class="small">class metadata, classloader issues</text>
  <rect x="755" y="455" width="270" height="64" class="chip"/>
  <text x="778" y="481" class="label">Native / direct memory</text>
  <text x="778" y="503" class="small">buffers, JVM internals, libraries</text>
  <text x="752" y="555" class="tiny">Commands:</text>
  <text x="776" y="582" class="small">jcmd PID GC.heap_info</text>
  <text x="776" y="608" class="small">jcmd PID VM.native_memory summary</text>
  <text x="776" y="634" class="small">jstack PID</text>

  <rect x="1090" y="115" width="265" height="535" class="box alert"/>
  <text x="1117" y="150" class="label">App / Mitigation View</text>
  <text x="1117" y="178" class="small">Question: how do we reduce impact?</text>
  <rect x="1120" y="215" width="205" height="70" class="chip"/>
  <text x="1143" y="242" class="label">Check app signal</text>
  <text x="1143" y="265" class="small">logs, 5xx, latency</text>
  <rect x="1120" y="305" width="205" height="70" class="chip"/>
  <text x="1143" y="332" class="label">Mitigate safely</text>
  <text x="1143" y="355" class="small">scale, rollback, restart one</text>
  <rect x="1120" y="395" width="205" height="70" class="chip"/>
  <text x="1143" y="422" class="label">Collect evidence</text>
  <text x="1143" y="445" class="small">heap dump only if safe</text>
  <text x="1117" y="520" class="tiny">Interview line:</text>
  <text x="1141" y="548" class="small">Mitigate first, then root cause.</text>
  <text x="1141" y="574" class="small">Do not kill all targets at once.</text>

  <path class="line" d="M350 382 H385"/>
  <path class="line" d="M690 382 H725"/>
  <path class="line" d="M1055 382 H1090"/>
  <path class="orangeLine" d="M1222 650 C1222 710 197 710 197 650"/>

  <text x="700" y="735" text-anchor="middle" class="sub">Memory hook: host pressure -> process owner -> JVM area -> app impact -> safe mitigation.</text>
</svg>
